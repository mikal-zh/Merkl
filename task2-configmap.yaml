apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: intern-assessment
data:
  APP_ENV: staging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: intern-assessment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_ENV
